services:
  postgres:
    image: postgres:17-alpine
    container_name: tkb_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: tkb_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tkb_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../BE_TKB
      dockerfile: Dockerfile
    container_name: tkb_backend
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/tkb_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: superscretkeytkb2024
      PORT: "4000"
    ports:
      - "4000:4000"

volumes:
  postgres_data:
  redis_data:
